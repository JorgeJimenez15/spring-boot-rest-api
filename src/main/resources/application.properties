## Database Properties
database=mysql
db.project = ${MYSQL_DB_PROJECT}
db.server = ${MYSQL_DB_SERVER}
db.name = ${MYSQL_DB_NAME}
db.user = ${MYSQL_DB_USER}
db.pw = ${MYSQL_DB_PASS}
spring.datasource.url=jdbc:mysql:///${db.name}?cloudSqlInstance=${db.project}:us-central1:${db.server}&socketFactory=com.google.cloud.sql.mysql.SocketFactory&user=${db.user}&password=${db.pw}&useSSL=FALSE

## Hibernate Properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
